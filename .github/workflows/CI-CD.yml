name: Deploy to EC2 SSM

on:
  push:
    branches:
      - main

jobs:
  CI-CD:
    runs-on: ubuntu-latest
    steps:
      # 1. 코드 체크아웃 (가장 먼저 수행)
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. JDK 설정
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew
        working-directory: community-BE

      - name: Build with Gradle
        run: ./gradlew build -x test
        working-directory: community-BE

      # 4. Docker Hub 로그인 및 빌드/푸시 (배포 전에 이미지가 먼저 올라가야 함)
      - name: Docker build & push 
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin
          docker build -t zven408/community-be:1.0.0 .
          docker push zven408/community-be:1.0.0

      # 5. AWS 인증 설정
      - name: Set up AWS CLI
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_S3_REGION }}

      # 6. EC2에 SSM으로 .env 생성 및 Docker 실행 명령 전달
      - name: Deploy to EC2 using SSM
        run: |
          # EC2 서버에서 한 줄씩 실행될 명령어들을 정의합니다.
          # 1) 배포 디렉토리로 이동
          # 2) 기존 .env 파일이 있다면 지우고 새로 생성 (sudo를 붙여 권한 문제 방지)
          # 3) GitHub Secrets의 값들을 echo 명령어로 .env 파일에 차례대로 주입
          # 4) 최신 이미지 pull 및 재시작
          COMMAND="cd /var/www/backend/4-lukas-community-BE && \
          sudo rm -f .env && \
          sudo touch .env && \
          sudo chown ubuntu:ubuntu .env && \
          echo 'JWT_SKY=${{ secrets.JWT_SKY }}' >> .env && \
          echo 'AWS_ACCESS_KEY=${{ secrets.AWS_ACCESS_KEY }}' >> .env && \
          echo 'AWS_SECRET_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}' >> .env && \
          echo 'AWS_S3_REGION=${{ secrets.AWS_S3_REGION }}' >> .env && \
          echo 'AWS_S3_BUCKET=${{ secrets.AWS_S3_BUCKET }}' >> .env && \
          echo 'SPRING_DATASOURCE_URL=${{ secrets.SPRING_DATASOURCE_URL }}' >> .env && \
          echo 'DB_NAME=${{ secrets.DB_NAME }}' >> .env && \
          echo 'DB_PASSWORD=${{ secrets.DB_PASSWORD }}' >> .env && \
          sudo docker compose pull && \
          sudo docker compose down && \
          sudo docker compose up -d"
          
          aws ssm send-command \
            --targets "Key=instanceIds,Values=${{ secrets.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploying Docker Compose Application with .env" \
            --parameters "commands=[$COMMAND]" \
            --region ${{ secrets.AWS_S3_REGION }}