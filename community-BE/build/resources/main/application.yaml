# $schema=invalid-url
spring:
  datasource:
    url: jdbc:mysql://localhost:3306/springdatajpa?serverTimezone=UTC&useSSL=false&allowPublicKeyRetrieval=true
    username: ${DB_NAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: create
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true

  profiles:
    active: development

logging:
  level:
    org.hibernate.SQL: debug

jwt:
  secret: ${JWT_SKY}
  access-token-exp-seconds: 300
  refresh-token-exp-seconds: 12096000